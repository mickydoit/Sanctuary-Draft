<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#111111" />
  <!-- Force browsers to always revalidate this page -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>LBH Club · World Cup Draft</title>
  <link rel="icon" type="image/svg+xml" href="assets/img/favicon.svg" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="assets/img/apple-touch-icon-v4.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="LBH Draft" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preload" href="assets/img/rnd-32-background.svg" as="image" />
  <link rel="preload" href="assets/img/rnd-32-players.svg" as="image" />
  <link rel="stylesheet" href="assets/css/styles.css?v=99" />
  <!-- Cache-bust: redirect to a versioned URL so stale cached pages reload once -->
  <script>
    (function () {
      var V = '89';
      try {
        if (localStorage.getItem('_lbhv') !== V) {
          localStorage.setItem('_lbhv', V);
          if (location.search.indexOf('_lbhv=') === -1) {
            location.replace(location.pathname + '?_lbhv=' + V + location.hash);
          }
        }
      } catch (e) {}
    })();
  </script>
  <script src="config.js"></script>
</head>
<body data-route="ladder" data-theme="dark">
  <div id="splash">
    <div class="splash-behind-wrap"><img class="splash-behind" src="assets/img/rnd-32-background.svg" alt="" /></div>
    <div class="splash-header">
      <img src="assets/img/rnd-32-logo.svg" class="splash-logo-img" alt="RND 32" />
    </div>
    <div class="splash-bar-track">
      <div class="splash-bar"></div>
    </div>
    <div class="splash-player-wrap"><img class="splash-player-img" src="assets/img/rnd-32-players.svg" alt="" /></div>
  </div>
  <div id="root"><main class="container"><p class="hint">Loading…</p></main></div>
  <script type="module" src="assets/js/app.js?v=66"></script>
  <script>if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');</script>
  <script>
    (function () {
      var p = document.querySelector('.splash-player-img');
      var b = document.querySelector('.splash-behind');
      if (!p) return;

      // Always use rAF before adding reveal class so the browser has painted
      // the opacity:0 initial state — without this the CSS transition is skipped
      function addCls(el, cls) {
        requestAnimationFrame(function () { el.classList.add(cls); });
      }

      // Background: reveal as soon as loaded
      if (b) {
        var showBg = function () { addCls(b, 'splash-reveal'); };
        if (b.complete && b.naturalWidth) { showBg(); }
        else if (b.decode) { b.decode().catch(function(){}).then(showBg); }
        else { b.addEventListener('load', showBg); b.addEventListener('error', showBg); }
      }

      // Players: reveal when decoded — no artificial delay
      var done = false;
      function showPlayers() {
        if (done) return; done = true;
        addCls(p, 'splash-reveal');
      }
      setTimeout(showPlayers, 5000);
      if (p.decode) { p.decode().catch(function(){}).then(showPlayers); }
      else { p.addEventListener('load', showPlayers); p.addEventListener('error', showPlayers); }
    })();
  </script>
</body>
</html>
